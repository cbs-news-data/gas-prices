name: run-gas-prices

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 11 * * *"  # 7:00am ET during DST; 6:00am ET during EST
    - cron: "0 12 * * *"  # 8:00am ET during DST; 7:00am ET during EST
  workflow_dispatch:

concurrency:
  group: run-gas-prices
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run-scripts:
    runs-on: ubuntu-latest
    env:
      EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
      DW_API_KEY: ${{ secrets.DW_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      # Single fast dependency install path + caching
      - name: Install dependencies (cached)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # pak is used under the hood; include explicitly to avoid surprises
          packages: |
            any::pak
            any::tidyverse
            any::janitor
            any::xml2
            any::jsonlite
            any::stringr
            any::rvest
            any::lubridate
            any::readr
            github::munichrocker/DatawRappr
          cache-version: 2

      - name: Set up environment variables
        run: |
          echo "EIA_API_KEY=${{ secrets.EIA_API_KEY }}" >> $GITHUB_ENV
          echo "DW_API_KEY=${{ secrets.DW_API_KEY }}" >> $GITHUB_ENV

      - name: Run collect script
        run: Rscript -e 'source("scripts/collect_gas_price_data.R")'

      - name: Run AAA script (primary)
        id: aaa_primary
        continue-on-error: true
        run: Rscript -e 'source("scripts/gas-prices-aaa.R")'

      - name: Run AAA rvest fallback
        id: aaa_fallback
        if: steps.aaa_primary.outcome == 'failure'
        continue-on-error: true
        run: Rscript -e 'source("scripts/gas-prices-aaa-rvest.R")'

      - name: Fail if both failed
        if: steps.aaa_primary.outcome == 'failure' && steps.aaa_fallback.outcome == 'failure'
        run: exit 1
      - name: Run xml export script
        run: Rscript -e 'source("scripts/xml_exports.R")'

      - name: Commit & push if changed
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "update data"
          git push
          
      - name: Notify Slack on success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data '{
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "📊 Gas Prices Updated!"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "The latest gas prices charts are *live*."
                  }
                }
              ]
            }'
      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data '{
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ Gas Prices Update Failed"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "The gas prices workflow encountered an error. Charts may not be up to date."
                  }
                }
              ]
            }'    
