name: run-gas-prices

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0,30 14 * * 2"  #10 and 10:30am ET on Tuesdays
    - cron: "0 15 * * 2"   # 11am Tuesdays
    - cron: "0 16 * * 2"   # 12pm Tuesdays
    
  workflow_dispatch:

jobs:
  run-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::dplyr 
            any::janitor
            any::tidyr
            any::lubridate
            any::dotenv
            any::xml2
            any::jsonlite
            any::readr
            any::rvest
            any::stringr
            any::jsonlite

      - name: Set up environment variables based on EIA_API_KEY secret
        run: echo "DW_API_KEY=${{ secrets.EIA_API_KEY }}" >> $GITHUB_ENV

      - name: Install DatawRappr package
        run: |
          Rscript -e "pak::pkg_install('munichrocker/DatawRappr')"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run script
        run: Rscript -e 'source("collect_gas_price_data.R")'
        
      - name: Run script
        run: Rscript -e 'source("xml_exports.R")'

      - name: Commit results
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit -m 'update data' || echo "No changes to commit"
          git push origin || echo "No changes to commit"
