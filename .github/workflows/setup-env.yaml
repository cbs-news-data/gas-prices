name: setup-env

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  warm-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies (cached)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::pak
            any::tidyverse
            any::janitor
            any::xml2
            any::jsonlite
            any::stringr
            any::rvest
            any::lubridate
            any::readr
            any::httr2
            any::purr
            any::tibble
            github::munichrocker/DatawRappr
          cache-version: 2
